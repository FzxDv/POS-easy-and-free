<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-slate-800 font-sans min-h-screen">
    <div class="flex flex-col md:flex-row justify-between h-screen items-center">
        <section class="w-1/2 h-screen text-center bg-brand-500 p-6 shadow-sm shadow-slate-300">
            <header class="flex flex-col md:flex-row justify-between mt-80 items-center gap-4">
                <div class="text-center mx-auto space-y-8">
                    <h1 class="text-6xl font-bold text-slate-900">BIENVENIDO</h1>
                    <i class="fa-solid fa-store text-8xl text-slate-900"></i>
                    <p class="text-slate-900 font-bold text-7xl">SISTEMA <span class="text-slate-100">POS </span>PRO</p>
                </div>
            </header>
        </section>
        <section class="w-1/2 flex flex-col justify-center items-center h-screen">
            <div class="text-center mx-auto space-y-4">
                <h1 class="text-5xl font-bold text-slate-900">Login</h1>
                <p class="text-slate-700 font-medium text-3xl">Iniciar sesión</p>
            </div>
            <form action="index.html"
                class="space-y-4 mt-4 bg-slate-100 p-6 rounded-3xl  shadow-sm shadow-slate-300 border border-slate-100">
                <div>
                    <label for="usuario" class="block text-sm font-medium text-slate-900 mb-1 ml-1">Usuario</label>
                    <input type="text" id="usuario" placeholder="Usuario"
                        class="w-full pl-3 pr-12 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition text-sm font-medium">
                </div>
                <div>
                    <label for="contraseña"
                        class="block text-sm font-medium text-slate-900 mb-1 ml-1">Contraseña</label>
                    <input type="password" id="contraseña" placeholder="Contraseña"
                        class="w-full pl-3 pr-12 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition text-sm font-medium">
                </div>
                <button
                    class="w-full pl-3 pr-12 py-2.5 bg-brand-500 text-white rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition text-sm font-bold">Iniciar
                    Sesión</button>
            </form>
        </section>
    </div>
    <script>
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const contraseña = document.getElementById('contraseña').value;
            if (usuario === 'admin' && contraseña === 'admin') {
                window.location.href = 'index.html';
                localStorage.setItem('usuario', usuario);
            } else {
                alert('Usuario o contraseña incorrectos');
            }
        });

    </script>
</body>

</html>
