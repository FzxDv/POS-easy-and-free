<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-slate-800 font-sans min-h-screen">
    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Section Welcome -->
        <section class="w-full md:w-1/2 bg-brand-500 p-8 flex items-center justify-center shadow-lg z-10">
            <div class="text-center space-y-6 md:space-y-8">
                <h1 class="text-4xl md:text-6xl font-bold text-slate-900">BIENVENIDO</h1>
                <i class="fa-solid fa-store text-6xl md:text-8xl text-slate-900"></i>
                <p class="text-3xl md:text-6xl lg:text-7xl font-bold text-slate-900">
                    SISTEMA <span class="text-slate-100">POS </span>PRO
                </p>
            </div>
        </section>

        <!-- Section Login Form -->
        <section class="w-full md:w-1/2 flex flex-col justify-center items-center p-6 md:p-12">
            <div class="w-full max-w-md space-y-8">
                <div class="text-center space-y-2">
                    <h1 class="text-4xl md:text-5xl font-bold text-slate-900">Login</h1>
                    <p class="text-slate-600 font-medium text-lg md:text-2xl">Iniciar sesión en su cuenta</p>
                </div>

                <form action="index.html" class="space-y-5 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                    <div>
                        <label for="usuario"
                            class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Usuario</label>
                        <div class="relative">
                            <input type="text" id="usuario" placeholder="Ingrese su usuario"
                                class="w-full pl-4 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition text-sm font-medium">
                        </div>
                    </div>
                    <div>
                        <label for="contraseña"
                            class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Contraseña</label>
                        <div class="relative">
                            <input type="password" id="contraseña" placeholder="••••••••"
                                class="w-full pl-4 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition text-sm font-medium">
                        </div>
                    </div>
                    <button type="submit"
                        class="w-full py-3.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl shadow-md hover:shadow-lg transition-all duration-200 text-sm font-bold uppercase tracking-wider">
                        Iniciar Sesión
                    </button>
                </form>
            </div>
        </section>
    </div>

    <script>
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const contraseña = document.getElementById('contraseña').value;
            if (usuario === 'admin' && contraseña === 'admin') {
                localStorage.setItem('usuario', usuario);
                window.location.href = 'index.html';
            } else {
                alert('Usuario o contraseña incorrectos');
            }
        });
    </script>
</body>

</html>
```
